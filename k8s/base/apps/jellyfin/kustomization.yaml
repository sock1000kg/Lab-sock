apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  - route.yaml

helmCharts:
  - name: jellyfin
    repo: https://jellyfin.github.io/jellyfin-helm
    version: 2.7.0
    releaseName: jellyfin
    namespace: media
    valuesInline:
      ingress:
        main:
          enabled: false

      persistence:
        config:
          enabled: true
          storageClass: "local-path" # Using the standard K3s storage class
          accessMode: ReadWriteOnce
          size: 5Gi
        media:
          enabled: true
          type: hostPath
          hostPath: /opt/jellyfin/media # The directory you rsynced your music to
          mountPath: /media
